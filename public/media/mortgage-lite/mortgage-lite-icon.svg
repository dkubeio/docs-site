<svg width="128" height="128" viewBox="0 0 128 128" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bgGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#2563eb;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#1e40af;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="houseGradient" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#ffffff;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#e0e7ff;stop-opacity:1" />
    </linearGradient>
  </defs>
  
  <!-- Background circle -->
  <circle cx="64" cy="64" r="60" fill="url(#bgGradient)"/>
  
  <!-- House structure -->
  <g transform="translate(64, 64)">
    <!-- Roof -->
    <path d="M -28,-15 L 0,-35 L 28,-15 Z" fill="url(#houseGradient)" stroke="#1e40af" stroke-width="2"/>
    
    <!-- House body -->
    <rect x="-24" y="-15" width="48" height="36" fill="url(#houseGradient)" stroke="#1e40af" stroke-width="2"/>
    
    <!-- Door -->
    <rect x="-8" y="3" width="16" height="18" fill="#2563eb" stroke="#1e40af" stroke-width="1.5"/>
    <circle cx="4" cy="12" r="1.5" fill="#ffffff"/>
    
    <!-- Windows -->
    <rect x="-18" y="-5" width="8" height="8" fill="#93c5fd" stroke="#1e40af" stroke-width="1"/>
    <line x1="-14" y1="-5" x2="-14" y2="3" stroke="#1e40af" stroke-width="1"/>
    <line x1="-18" y1="-1" x2="-10" y2="-1" stroke="#1e40af" stroke-width="1"/>
    
    <rect x="10" y="-5" width="8" height="8" fill="#93c5fd" stroke="#1e40af" stroke-width="1"/>
    <line x1="14" y1="-5" x2="14" y2="3" stroke="#1e40af" stroke-width="1"/>
    <line x1="10" y1="-1" x2="18" y2="-1" stroke="#1e40af" stroke-width="1"/>
    
    <!-- AI Circuit pattern overlay -->
    <g opacity="0.3">
      <circle cx="-20" cy="28" r="2" fill="#60a5fa"/>
      <circle cx="0" cy="32" r="2" fill="#60a5fa"/>
      <circle cx="20" cy="28" r="2" fill="#60a5fa"/>
      <line x1="-20" y1="28" x2="0" y2="32" stroke="#60a5fa" stroke-width="1"/>
      <line x1="0" y1="32" x2="20" y2="28" stroke="#60a5fa" stroke-width="1"/>
    </g>
    
    <!-- Document icon in corner -->
    <g transform="translate(22, -28) scale(0.6)">
      <rect x="0" y="0" width="12" height="16" fill="#ffffff" stroke="#1e40af" stroke-width="1.5" rx="1"/>
      <line x1="2" y1="4" x2="10" y2="4" stroke="#2563eb" stroke-width="1"/>
      <line x1="2" y1="7" x2="10" y2="7" stroke="#2563eb" stroke-width="1"/>
      <line x1="2" y1="10" x2="8" y2="10" stroke="#2563eb" stroke-width="1"/>
    </g>
  </g>
  
  <!-- Checkmark badge -->
  <circle cx="96" cy="32" r="14" fill="#10b981" stroke="#ffffff" stroke-width="2"/>
  <path d="M 90,32 L 94,36 L 102,28" fill="none" stroke="#ffffff" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"/>
</svg>
