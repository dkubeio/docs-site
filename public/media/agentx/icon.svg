<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 128 128" width="128" height="128">
  <defs>
    <linearGradient id="clawGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#3b82f6;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#06b6d4;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="accentGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#8b5cf6;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#ec4899;stop-opacity:1" />
    </linearGradient>
    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="2" result="blur"/>
      <feComposite in="SourceGraphic" in2="blur" operator="over"/>
    </filter>
  </defs>
  
  <!-- Background circle -->
  <circle cx="64" cy="64" r="58" fill="#0f172a"/>
  
  <!-- Outer ring -->
  <circle cx="64" cy="64" r="56" fill="none" stroke="url(#clawGradient)" stroke-width="3"/>
  
  <!-- Central hub representing the pilot/control center -->
  <circle cx="64" cy="64" r="18" fill="url(#clawGradient)"/>
  
  <!-- Inner control dot -->
  <circle cx="64" cy="64" r="8" fill="#0f172a"/>
  <circle cx="64" cy="64" r="4" fill="#06b6d4"/>
  
  <!-- Claw arm segments extending from center -->
  <!-- Top claw arm -->
  <path d="M64 46 L64 28 L58 22 L64 16 L70 22 L64 28" 
        fill="none" stroke="url(#clawGradient)" stroke-width="4" stroke-linecap="round" stroke-linejoin="round"/>
  <circle cx="64" cy="16" r="5" fill="url(#accentGradient)"/>
  
  <!-- Right claw arm -->
  <path d="M82 64 L100 64 L106 58 L112 64 L106 70 L100 64" 
        fill="none" stroke="url(#clawGradient)" stroke-width="4" stroke-linecap="round" stroke-linejoin="round"/>
  <circle cx="112" cy="64" r="5" fill="url(#accentGradient)"/>
  
  <!-- Bottom claw arm -->
  <path d="M64 82 L64 100 L58 106 L64 112 L70 106 L64 100" 
        fill="none" stroke="url(#clawGradient)" stroke-width="4" stroke-linecap="round" stroke-linejoin="round"/>
  <circle cx="64" cy="112" r="5" fill="url(#accentGradient)"/>
  
  <!-- Left claw arm -->
  <path d="M46 64 L28 64 L22 58 L16 64 L22 70 L28 64" 
        fill="none" stroke="url(#clawGradient)" stroke-width="4" stroke-linecap="round" stroke-linejoin="round"/>
  <circle cx="16" cy="64" r="5" fill="url(#accentGradient)"/>
  
  <!-- Connection lines from center to arms -->
  <line x1="64" y1="46" x2="64" y2="54" stroke="url(#clawGradient)" stroke-width="2"/>
  <line x1="74" y1="64" x2="82" y2="64" stroke="url(#clawGradient)" stroke-width="2"/>
  <line x1="64" y1="74" x2="64" y2="82" stroke="url(#clawGradient)" stroke-width="2"/>
  <line x1="54" y1="64" x2="46" y2="64" stroke="url(#clawGradient)" stroke-width="2"/>
  
  <!-- Small decorative elements representing code/automation -->
  <text x="64" y="124" text-anchor="middle" fill="#64748b" font-family="monospace" font-size="6" font-weight="bold">&lt;/&gt;</text>
</svg>
