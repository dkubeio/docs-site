# Build docs and publish generated output to deployment branch.
name: Build docs and publish site files branch

on:
  # Run on docs-related pushes (any branch/tag), tag create/delete, and manual dispatch.
  push:
    branches:
      - '**'
    tags:
      - '**'
    paths:
      - '*.md'
      - 'applications/**'
      - 'images/**'
      - '_static/**'
      - '_templates/**'
      - 'conf.py'
      - 'build_docs.sh'
      - 'requirements.txt'
      - '.github/workflows/build.yml'
  create:
  delete:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-and-publish:
    # For create/delete events, execute only when the ref is a tag.
    if: >-
      github.event_name == 'workflow_dispatch' ||
      (github.event_name == 'push' && !(github.ref_type == 'tag' && github.ref_name == 'latest')) ||
      (github.event_name == 'create' && github.event.ref_type == 'tag' && github.event.ref != 'latest') ||
      (github.event_name == 'delete' && github.event.ref_type == 'tag' && github.event.ref != 'latest')
    runs-on: ubuntu-latest

    steps:
      # For delete events, checkout default branch because deleted ref no longer exists.
      - name: Check out repository
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event_name == 'delete' && github.event.repository.default_branch || github.ref }}
          # Full history/tags retained for tag-aware operations.
          fetch-depth: 0
          fetch-tags: true

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Refresh latest tag locally
        if: >-
          github.event_name == 'workflow_dispatch' ||
          (github.event_name == 'push' && github.ref_type != 'tag')
        run: |
          git tag -f latest "${GITHUB_SHA}"

      # Build docs via repository script.
      - name: Build documentation
        run: |
          BUILD_PYTHON=python bash build_docs.sh

      - name: Add custom domain file
        run: |
          echo "dkubex2.dkube.io" > CNAME

      # Keep generated output as workflow artifact.
      - name: Upload built site artifact
        uses: actions/upload-artifact@v4
        with:
          name: built-docs-site
          path: |
            docs
            docs-*
            CNAME

      # Publish generated snapshot to site-files branch.
      - name: Publish built site to site-files branch
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          # Prepare Pages source layout under publish/docs.
          mkdir -p publish/docs

          cp -R docs/. publish/docs/
          find . -maxdepth 1 -type d -name 'docs-*' -exec cp -R {} publish/docs/ \;

          cp CNAME publish/docs/
          touch publish/docs/.nojekyll

          # Rewrite links for docs-folder Pages mode.
          python - <<'PY'
          from pathlib import Path
          import re

          root = Path("publish/docs")
          for html in root.rglob("*.html"):
              content = html.read_text(encoding="utf-8")
              # In docs-folder Pages mode, latest is site root (/index.html), not /docs/index.html.
              updated = re.sub(r'href="((?:\.\./)*)docs/([^"]*)"', r'href="\1\2"', content)
              if updated != content:
                  html.write_text(updated, encoding="utf-8")
          PY

          cd publish

          git init
          git checkout -B site-files
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

          # Full snapshot stage, including removals.
          git add -A

          if git diff --cached --quiet; then
            echo "No changes to publish"
            exit 0
          fi

          git commit -m "Deploy site from ${GITHUB_SHA}"

          git remote add origin "https://x-access-token:${GITHUB_TOKEN}@github.com/${GITHUB_REPOSITORY}.git"
          git push --force origin site-files

      - name: Push latest tag
        if: >-
          github.event_name == 'workflow_dispatch' ||
          (github.event_name == 'push' && github.ref_type != 'tag')
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          git push --force "https://x-access-token:${GITHUB_TOKEN}@github.com/${GITHUB_REPOSITORY}.git" refs/tags/latest