name: Build docs and publish site files branch

on:
  push:
    branches:
      - '**'
    paths:
      - 'raw-v*/**'
      - 'requirements.txt'
      - '.github/workflows/build.yml'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-and-publish:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Build documentation
        run: |
          set -euo pipefail
          rm -rf docs docs-v* CNAME

          SRC_DIRS="$(find . -maxdepth 1 -type d -name 'raw-v*' -print | sed 's|^\./||' | sort -V)"
          if [ -z "$SRC_DIRS" ]; then
            echo "No raw-v* directories found."
            exit 1
          fi

          printf '%s\n' "$SRC_DIRS" | while IFS= read -r SRC_DIR; do
            VERSION="${SRC_DIR#raw-}"
            python -m sphinx -b html -W --keep-going "$SRC_DIR" "docs-$VERSION"
          done

          LATEST_SRC_DIR="$(printf '%s\n' "$SRC_DIRS" | tail -n1)"
          python -m sphinx -b html -W --keep-going "$LATEST_SRC_DIR" docs

          if [ ! -f docs/index.html ]; then
            echo "Build failed: docs/index.html was not generated."
            exit 1
          fi

      - name: Add custom domain file
        run: |
          echo "docs-test.dkube.io" > CNAME

      - name: Upload built site artifact
        uses: actions/upload-artifact@v4
        with:
          name: built-docs-site
          path: |
            docs
            docs-v*
            CNAME

      - name: Publish built site to site-files branch
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          mkdir -p publish
          cp -R docs publish/
          find . -maxdepth 1 -type d -name 'docs-v*' -exec cp -R {} publish/ \;
          cp CNAME publish/

          cd publish

          git init
          git checkout -B site-files
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

          git add -A

          if git diff --cached --quiet; then
            echo "No changes to publish"
            exit 0
          fi

          git commit -m "Deploy site from ${GITHUB_SHA}"

          git remote add origin "https://x-access-token:${GITHUB_TOKEN}@github.com/${GITHUB_REPOSITORY}.git"
          git push --force origin site-files