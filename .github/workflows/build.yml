name: Build docs and publish site files branch

on:
  push:
    branches:
      - '**'
    paths:
      - '*.md'
      - 'applications/**'
      - 'images/**'
      - '_static/**'
      - '_templates/**'
      - 'conf.py'
      - 'requirements.txt'
      - '.github/workflows/build.yml'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-and-publish:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Build documentation
        run: |
          set -euo pipefail
          rm -rf docs
          python -m sphinx -E -b html -W --keep-going . docs

          if [ ! -f docs/index.html ]; then
            echo "Build failed: docs/index.html was not generated."
            exit 1
          fi

      - name: Add custom domain file
        run: |
          echo "docs-test.dkube.io" > CNAME

      - name: Upload built site artifact
        uses: actions/upload-artifact@v4
        with:
          name: built-docs-site
          path: |
            docs
            CNAME

      - name: Publish built site to site-files branch
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          mkdir -p publish
          cp -R docs publish/
          cp CNAME publish/

          cd publish

          git init
          git checkout -B site-files
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

          git add -A

          if git diff --cached --quiet; then
            echo "No changes to publish"
            exit 0
          fi

          git commit -m "Deploy site from ${GITHUB_SHA}"

          git remote add origin "https://x-access-token:${GITHUB_TOKEN}@github.com/${GITHUB_REPOSITORY}.git"
          git push --force origin site-files