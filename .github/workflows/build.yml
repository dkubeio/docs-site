name: Build docs and publish site files branch

on:
  push:
    branches:
      - '**'
    paths:
      - '*.md'
      - 'applications/**'
      - 'images/**'
      - '_static/**'
      - '_templates/**'
      - 'conf.py'
      - 'build_docs.sh'
      - 'requirements.txt'
      - '.github/workflows/build.yml'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-and-publish:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          fetch-tags: true

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Build documentation
        run: |
          BUILD_PYTHON=python bash build_docs.sh

      - name: Add custom domain file
        run: |
          echo "dkubex2.dkube.io" > CNAME

      - name: Upload built site artifact
        uses: actions/upload-artifact@v4
        with:
          name: built-docs-site
          path: |
            docs
            docs-v*
            CNAME

      - name: Publish built site to site-files branch
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          mkdir -p publish/docs
          cp -R docs/. publish/docs/
          find . -maxdepth 1 -type d -name 'docs-v*' -exec cp -R {} publish/docs/ \;
          cp CNAME publish/docs/
          touch publish/docs/.nojekyll

          python - <<'PY'
          from pathlib import Path
          import re

          root = Path("publish/docs")
          for html in root.rglob("*.html"):
              content = html.read_text(encoding="utf-8")
              # In docs-folder Pages mode, latest is site root (/index.html), not /docs/index.html.
              updated = re.sub(r'href="((?:\.\./)*)docs/([^"]*)"', r'href="\1\2"', content)
              if updated != content:
                  html.write_text(updated, encoding="utf-8")
          PY

          cd publish

          git init
          git checkout -B site-files
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

          git add -A

          if git diff --cached --quiet; then
            echo "No changes to publish"
            exit 0
          fi

          git commit -m "Deploy site from ${GITHUB_SHA}"

          git remote add origin "https://x-access-token:${GITHUB_TOKEN}@github.com/${GITHUB_REPOSITORY}.git"
          git push --force origin site-files