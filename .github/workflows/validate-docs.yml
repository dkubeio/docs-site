name: Validate Docs Update

on:
  pull_request:
    branches: [main]
    paths:
      - "docs/**"
      - "public/**"

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build VitePress (catches broken links, invalid markdown)
        run: npm run docs:build
